<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Travel Info</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container fade-in">

        <h2 class="title">Confirm Travel Info.</h2>

        <!-- Travel Details Card -->
        <div class="blue-card">
            <h3>🔒 Your Travel Details</h3>
            <p><b>Target Train Number:</b> {{ train_no }}</p>
            <p><b>Travel Commencement:</b> {{ departure }}</p>
            <p><b>Terminal:</b> {{ destination }}</p>
        </div>

        <!-- Authorize Button -->
        <a href="/dashboard?train_no={{ train_no }}&departure={{ departure }}&destination={{ destination }}">
            <button class="btn-green">✅ AUTHORIZE FINAL STATUS REPORT →</button>
        </a>

        <br>
        <a href="/">
            <button class="btn-back">← Back to Search</button>
        </a>

    </div>

</body>
</html>
